name: Actualizar noticias

on:
  schedule:
    # Cada hora, en el minuto 10. GitHub usa UTC (Perú = UTC-5).
    - cron: '10 * * * *'
  workflow_dispatch:        # botón manual en la pestaña Actions

permissions:
  contents: write

concurrency:
  group: noticias
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Leer feeds y generar noticias.json
        run: node scripts/fetch-noticias.js

      - name: Publicar si hubo cambios
        run: |
          git config user.name  "jhc-bot"
          git config user.email "actions@github.com"
          git add noticias.json
          if git diff --staged --quiet; then
            echo "Sin novedades."
          else
            git commit -m "noticias: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
